<!DOCTYPE html>
<!--
  扫雷 V0.2 — 单文件 HTML 游戏
  特性：选难度后手动开始、首点安全布雷、本地战绩记录
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>扫雷 V0.2</title>
  <!-- 样式：布局、棋盘格子、战绩面板 -->
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e8e8e8;
      padding: 20px;
      user-select: none;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      letter-spacing: 0.1em;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    .version-tag {
      font-size: 0.55em;
      font-weight: 600;
      color: #63b3ed;
      vertical-align: middle;
    }

    .layout {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: flex-start;
      justify-content: center;
      max-width: 1200px;
      width: 100%;
    }

    .main-col {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .controls label {
      font-size: 0.9rem;
      color: #a0aec0;
    }

    select, button {
      font-family: inherit;
      font-size: 0.95rem;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
    }

    select {
      background: #2d3748;
      color: #e8e8e8;
      border: 1px solid #4a5568;
    }

    select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button {
      background: linear-gradient(180deg, #48bb78, #38a169);
      color: white;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.35);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    button.secondary {
      background: linear-gradient(180deg, #4299e1, #3182ce);
    }

    .game-panel {
      background: #2d3748;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      border: 2px solid #4a5568;
      position: relative;
    }

    /* 等待开局时禁止点击棋盘 */
    .game-panel.idle .board-wrap {
      pointer-events: none;
    }

    .idle-overlay {
      position: absolute;
      inset: 16px;
      top: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(26, 32, 44, 0.85);
      border-radius: 8px;
      z-index: 10;
      text-align: center;
      padding: 24px;
    }

    .idle-overlay.hidden {
      display: none;
    }

    .idle-overlay p {
      font-size: 1rem;
      color: #a0aec0;
      line-height: 1.8;
    }

    .idle-overlay strong {
      color: #63b3ed;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: #1a202c;
      border-radius: 8px;
      font-family: "Courier New", monospace;
      font-size: 1.4rem;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .status-bar .mines { color: #fc8181; }
    .status-bar .timer { color: #68d391; }

    .face-btn {
      width: 44px;
      height: 44px;
      font-size: 1.6rem;
      padding: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #ecc94b, #d69e2e);
      line-height: 44px;
    }

    .board-wrap {
      overflow: auto;
      max-width: 95vw;
      max-height: 70vh;
    }

    .board {
      display: grid;
      gap: 0;
      background: #4a5568;
      border: 3px solid #718096;
      border-style: outset;
      min-width: 80px;
      min-height: 80px;
    }

    .cell {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(145deg, #a0aec0, #718096);
      border: 2px solid;
      border-color: #e2e8f0 #4a5568 #4a5568 #e2e8f0;
      transition: background 0.05s;
    }

    .cell:hover:not(.revealed):not(.flagged):not(.disabled) {
      background: linear-gradient(145deg, #b8c5d6, #8a9bb0);
    }

    .cell.disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .cell.revealed {
      background: #cbd5e0;
      border: 1px solid #a0aec0;
      cursor: default;
    }

    .cell.mine-hit { background: #e53e3e; }

    .cell.flagged {
      background: linear-gradient(145deg, #a0aec0, #718096);
    }

    .cell.flagged::after {
      content: "🚩";
      font-size: 16px;
    }

    .cell.mine.revealed::after {
      content: "💣";
      font-size: 16px;
    }

    /* 数字 1–8 使用经典扫雷配色 */
    .cell.n1 { color: #0000ff; }
    .cell.n2 { color: #008000; }
    .cell.n3 { color: #ff0000; }
    .cell.n4 { color: #000080; }
    .cell.n5 { color: #800000; }
    .cell.n6 { color: #008080; }
    .cell.n7 { color: #000000; }
    .cell.n8 { color: #808080; }

    .message {
      margin-top: 16px;
      min-height: 28px;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .message.win { color: #68d391; }
    .message.lose { color: #fc8181; }
    .message.idle { color: #63b3ed; }

    .hint {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #718096;
      text-align: center;
      max-width: 420px;
      line-height: 1.6;
    }

    .records-panel {
      background: #2d3748;
      border-radius: 12px;
      padding: 16px;
      border: 2px solid #4a5568;
      min-width: 280px;
      max-width: 360px;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .records-panel h2 {
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: #63b3ed;
      border-bottom: 1px solid #4a5568;
      padding-bottom: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }

    .stat-card {
      background: #1a202c;
      border-radius: 6px;
      padding: 8px 10px;
    }

    .stat-card .label {
      color: #718096;
      font-size: 0.75rem;
    }

    .stat-card .value {
      font-weight: 700;
      margin-top: 4px;
    }

    .stat-card .value.win { color: #68d391; }
    .stat-card .value.lose { color: #fc8181; }

    .records-list {
      overflow-y: auto;
      flex: 1;
      font-size: 0.82rem;
    }

    .records-list table {
      width: 100%;
      border-collapse: collapse;
    }

    .records-list th,
    .records-list td {
      padding: 6px 4px;
      text-align: left;
      border-bottom: 1px solid #4a5568;
    }

    .records-list th {
      color: #a0aec0;
      font-weight: 600;
      position: sticky;
      top: 0;
      background: #2d3748;
    }

    .records-list .result-win { color: #68d391; }
    .records-list .result-lose { color: #fc8181; }

    .records-empty {
      color: #718096;
      text-align: center;
      padding: 24px 8px;
      font-size: 0.9rem;
    }

    .records-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }

    .records-actions button {
      flex: 1;
      font-size: 0.8rem;
      padding: 6px 10px;
      background: linear-gradient(180deg, #718096, #4a5568);
    }
  </style>
</head>
<body>
  <h1>💣 扫雷 <span class="version-tag">V0.2</span></h1>

  <div class="layout">
    <!-- 左侧：难度选择与游戏区 -->
    <div class="main-col">
      <div class="controls">
        <label>
          难度：
          <select id="difficulty">
            <option value="">— 请选择 —</option>
            <option value="beginner">初级 (9×9, 10雷)</option>
            <option value="intermediate">中级 (16×16, 40雷)</option>
            <option value="expert">高级 (16×30, 99雷)</option>
          </select>
        </label>
        <button id="startGame">开始游戏</button>
        <button id="newGame" class="secondary" disabled>再来一局</button>
      </div>

      <div class="game-panel idle" id="gamePanel">
        <div class="status-bar">
          <span class="mines" id="mineCount">---</span>
          <button class="face-btn" id="faceBtn" title="重新开始" disabled>😊</button>
          <span class="timer" id="timer">000</span>
        </div>
        <div class="board-wrap">
          <div class="board" id="board"></div>
        </div>
        <div class="idle-overlay" id="idleOverlay">
          <p>请先选择<strong>游戏难度</strong>，<br>再点击<strong>开始游戏</strong></p>
        </div>
      </div>

      <p class="message idle" id="message">等待开始…</p>
      <p class="hint">左键翻开 · 右键插旗 · 结束后自动记录战绩（本地保存）</p>
    </div>

    <!-- 右侧：本地战绩统计与历史 -->
    <aside class="records-panel">
      <h2>📊 战绩记录</h2>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="records-list" id="recordsList"></div>
      <div class="records-actions">
        <button type="button" id="exportRecords">导出 JSON</button>
        <button type="button" id="clearRecords">清空记录</button>
      </div>
    </aside>
  </div>

  <script>
    // ========== 常量配置 ==========
    const VERSION = "V0.2";
    const STORAGE_KEY = "minesweeper_records_v0.2"; // localStorage 键名

    /** 各难度：行、列、雷数、显示名称 */
    const DIFFICULTY = {
      beginner: { rows: 9, cols: 9, mines: 10, label: "初级" },
      intermediate: { rows: 16, cols: 16, mines: 40, label: "中级" },
      expert: { rows: 16, cols: 30, mines: 99, label: "高级" },
    };

    /** 游戏流程状态：等待开始 / 进行中 / 已结束 */
    const GAME_STATE = { IDLE: "idle", PLAYING: "playing", ENDED: "ended" };

    // ========== 游戏运行时状态 ==========
    let gameState = GAME_STATE.IDLE;
    let rows, cols, mineCount;
    let board = [];       // 棋盘数据：-1=雷，0=空，1-8=周围雷数
    let revealed = [];    // 是否已翻开
    let flagged = [];     // 是否已插旗
    let gameOver = false;
    let gameWon = false;
    let firstClick = true; // 首次点击后才布雷（保证首点安全）
    let timerInterval = null;
    let seconds = 0;
    let flagsPlaced = 0;  // 当前插旗数量
    let currentDifficulty = ""; // 本局难度 key，用于战绩归档

    // ========== DOM 引用 ==========
    const boardEl = document.getElementById("board");
    const mineCountEl = document.getElementById("mineCount");
    const timerEl = document.getElementById("timer");
    const faceBtn = document.getElementById("faceBtn");
    const messageEl = document.getElementById("message");
    const difficultyEl = document.getElementById("difficulty");
    const gamePanelEl = document.getElementById("gamePanel");
    const idleOverlayEl = document.getElementById("idleOverlay");
    const startBtn = document.getElementById("startGame");
    const newGameBtn = document.getElementById("newGame");
    const statsGridEl = document.getElementById("statsGrid");
    const recordsListEl = document.getElementById("recordsList");

    /** 将数字格式化为三位显示（如 007） */
    function pad3(n) {
      return String(Math.max(0, Math.min(999, n))).padStart(3, "0");
    }

    /** 时间戳转本地日期时间字符串 */
    function formatDateTime(ts) {
      const d = new Date(ts);
      const p = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
    }

    /** 从 localStorage 读取战绩；解析失败时返回空数据 */
    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { records: [], stats: {} };
        const data = JSON.parse(raw);
        return {
          records: Array.isArray(data.records) ? data.records : [],
          stats: data.stats && typeof data.stats === "object" ? data.stats : {},
        };
      } catch {
        return { records: [], stats: {} };
      }
    }

    /** 持久化战绩到 localStorage */
    function saveRecords(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    /** 确保某难度的汇总统计对象存在 */
    function ensureStats(stats, key) {
      if (!stats[key]) {
        stats[key] = { wins: 0, losses: 0, bestTime: null, totalGames: 0 };
      }
      return stats[key];
    }

    /** 一局结束后写入单条记录并更新胜败、最佳用时 */
    function recordGameResult(won) {
      if (!currentDifficulty) return;

      const data = loadRecords();
      const cfg = DIFFICULTY[currentDifficulty];
      const entry = {
        id: Date.now(),
        version: VERSION,
        difficulty: currentDifficulty,
        difficultyLabel: cfg.label,
        won,
        seconds,
        date: formatDateTime(Date.now()),
      };

      data.records.unshift(entry); // 新记录插到最前
      if (data.records.length > 100) data.records.length = 100; // 最多保留 100 条

      const st = ensureStats(data.stats, currentDifficulty);
      st.totalGames++;
      if (won) {
        st.wins++;
        if (st.bestTime === null || seconds < st.bestTime) st.bestTime = seconds;
      } else {
        st.losses++;
      }

      saveRecords(data);
      renderRecordsPanel();
    }

    /** 刷新右侧战绩面板：总览统计 + 最近对局列表 */
    function renderRecordsPanel() {
      const data = loadRecords();

      const totalWins = Object.values(data.stats).reduce((s, x) => s + (x.wins || 0), 0);
      const totalLosses = Object.values(data.stats).reduce((s, x) => s + (x.losses || 0), 0);
      const totalGames = totalWins + totalLosses;

      statsGridEl.innerHTML = `
        <div class="stat-card">
          <div class="label">总场次</div>
          <div class="value">${totalGames}</div>
        </div>
        <div class="stat-card">
          <div class="label">胜 / 负</div>
          <div class="value"><span class="win">${totalWins}</span> / <span class="lose">${totalLosses}</span></div>
        </div>
        ${Object.entries(DIFFICULTY).map(([key, cfg]) => {
          const st = data.stats[key] || { wins: 0, losses: 0, bestTime: null };
          const best = st.bestTime != null ? `${st.bestTime}秒` : "—";
          return `
            <div class="stat-card" style="grid-column: span 2">
              <div class="label">${cfg.label} 最佳 / 胜败</div>
              <div class="value">${best} · <span class="win">${st.wins || 0}</span>/<span class="lose">${st.losses || 0}</span></div>
            </div>`;
        }).join("")}
      `;

      if (data.records.length === 0) {
        recordsListEl.innerHTML = '<p class="records-empty">暂无记录<br>完成一局后将自动保存</p>';
        return;
      }

      recordsListEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>难度</th>
              <th>结果</th>
              <th>用时</th>
            </tr>
          </thead>
          <tbody>
            ${data.records.slice(0, 50).map((r) => `
              <tr>
                <td>${r.date.split(" ")[1] || r.date}</td>
                <td>${r.difficultyLabel}</td>
                <td class="${r.won ? "result-win" : "result-lose"}">${r.won ? "胜" : "负"}</td>
                <td>${r.seconds}s</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    /**
     * 根据 gameState 同步界面：遮罩、按钮禁用、状态栏复位
     * 对局中锁定难度与「开始」；结束后才可用「再来一局」
     */
    function setUIForState() {
      const isIdle = gameState === GAME_STATE.IDLE;
      const isPlaying = gameState === GAME_STATE.PLAYING;
      const isEnded = gameState === GAME_STATE.ENDED;

      gamePanelEl.classList.toggle("idle", isIdle);
      idleOverlayEl.classList.toggle("hidden", !isIdle);

      difficultyEl.disabled = isPlaying;
      startBtn.disabled = isPlaying;
      newGameBtn.disabled = !isEnded;
      faceBtn.disabled = isIdle;

      if (isIdle) {
        mineCountEl.textContent = "---";
        timerEl.textContent = "000";
        faceBtn.textContent = "😊";
        messageEl.textContent = "等待开始…";
        messageEl.className = "message idle";
      }
    }

    /** 读取当前选中的难度配置；未选择时返回 null */
    function getConfig() {
      const key = difficultyEl.value;
      if (!key || !DIFFICULTY[key]) return null;
      return DIFFICULTY[key];
    }

    /** 未开局时显示 9×9 灰色占位格 */
    function showIdleBoard() {
      boardEl.style.gridTemplateColumns = "repeat(9, 28px)";
      boardEl.innerHTML = "";
      for (let i = 0; i < 81; i++) {
        const cell = document.createElement("div");
        cell.className = "cell disabled";
        boardEl.appendChild(cell);
      }
    }

    /** 校验难度后进入对局，初始化棋盘 */
    function startGame() {
      const cfg = getConfig();
      if (!cfg) {
        messageEl.textContent = "请先选择游戏难度！";
        messageEl.className = "message idle";
        return;
      }

      currentDifficulty = difficultyEl.value;
      gameState = GAME_STATE.PLAYING;
      initBoard();
      setUIForState();
      messageEl.textContent = "";
      messageEl.className = "message";
    }

    /** 按难度创建空棋盘并重置计时、旗子计数（此时尚未布雷） */
    function initBoard() {
      const cfg = getConfig();
      rows = cfg.rows;
      cols = cfg.cols;
      mineCount = cfg.mines;

      board = Array.from({ length: rows }, () => Array(cols).fill(0));
      revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
      flagged = Array.from({ length: rows }, () => Array(cols).fill(false));

      gameOver = false;
      gameWon = false;
      firstClick = true;
      flagsPlaced = 0;
      seconds = 0;

      stopTimer();
      updateMineDisplay();
      updateTimerDisplay();
      faceBtn.textContent = "😊";
      renderBoard();
    }

    /** 回到等待开始状态 */
    function resetToIdle() {
      gameState = GAME_STATE.IDLE;
      currentDifficulty = "";
      gameOver = false;
      gameWon = false;
      stopTimer();
      showIdleBoard();
      setUIForState();
    }

    /**
     * 在首次点击后随机布雷
     * excludeR/C：首点坐标；首点及其周围 3×3 区域不放雷
     * 布雷完成后计算每格周围雷数（1-8），雷格保持 -1
     */
    function placeMines(excludeR, excludeC) {
      let placed = 0;
      while (placed < mineCount) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        if (board[r][c] === -1) continue;
        if (r === excludeR && c === excludeC) continue;
        if (Math.abs(r - excludeR) <= 1 && Math.abs(c - excludeC) <= 1) continue;
        board[r][c] = -1;
        placed++;
      }

      // 为非雷格子填入相邻雷数
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (board[r][c] === -1) continue;
          let count = 0;
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) count++;
            }
          }
          board[r][c] = count;
        }
      }
    }

    /** 根据 rows/cols 生成格子 DOM 并绑定左键翻开、右键插旗 */
    function renderBoard() {
      boardEl.style.gridTemplateColumns = `repeat(${cols}, 28px)`;
      boardEl.innerHTML = "";

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.addEventListener("click", () => handleClick(r, c));
          cell.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            handleRightClick(r, c);
          });
          boardEl.appendChild(cell);
        }
      }
    }

    /** 通过行列下标取得对应格子元素（按行优先扁平索引） */
    function getCellEl(r, c) {
      return boardEl.children[r * cols + c];
    }

    /** 根据 revealed / flagged / board 数据更新单格样式与数字 */
    function updateCellDisplay(r, c) {
      const el = getCellEl(r, c);
      el.className = "cell";
      el.textContent = "";

      if (flagged[r][c] && !revealed[r][c]) {
        el.classList.add("flagged");
        return;
      }
      if (!revealed[r][c]) return;

      el.classList.add("revealed");
      if (board[r][c] === -1) {
        el.classList.add("mine");
        return;
      }
      if (board[r][c] > 0) {
        el.textContent = board[r][c];
        el.classList.add("n" + board[r][c]);
      }
    }

    /** 左键：首次点击布雷并开计时，之后翻开格子；踩雷则失败 */
    function handleClick(r, c) {
      if (gameState !== GAME_STATE.PLAYING || gameOver || gameWon || flagged[r][c]) return;

      if (firstClick) {
        firstClick = false;
        placeMines(r, c);
        startTimer();
      }
      if (revealed[r][c]) return;

      reveal(r, c);
      if (board[r][c] === -1) {
        endGame(false);
        return;
      }
      checkWin();
    }

    /**
     * 右键：切换插旗状态
     * 当旗数等于雷数且全部标对时，直接判定胜利
     */
    function handleRightClick(r, c) {
      if (gameState !== GAME_STATE.PLAYING || gameOver || gameWon || revealed[r][c]) return;

      if (firstClick) {
        firstClick = false;
        placeMines(r, c);
        startTimer();
      }

      flagged[r][c] = !flagged[r][c];
      flagsPlaced += flagged[r][c] ? 1 : -1;
      updateMineDisplay();
      updateCellDisplay(r, c);

      if (flagsPlaced === mineCount) {
        let allCorrect = true;
        for (let i = 0; i < rows; i++) {
          for (let j = 0; j < cols; j++) {
            if (board[i][j] === -1 && !flagged[i][j]) allCorrect = false;
            if (board[i][j] !== -1 && flagged[i][j]) allCorrect = false;
          }
        }
        if (allCorrect) endGame(true);
      }
    }

    /** 翻开一格；若为 0 则递归翻开周围（泛洪填充） */
    function reveal(r, c) {
      if (r < 0 || r >= rows || c < 0 || c >= cols) return;
      if (revealed[r][c] || flagged[r][c]) return;

      revealed[r][c] = true;
      updateCellDisplay(r, c);
      if (board[r][c] !== 0) return;

      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          reveal(r + dr, c + dc);
        }
      }
    }

    /** 所有非雷格均已翻开则胜利 */
    function checkWin() {
      let unrevealedSafe = 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (!revealed[r][c] && board[r][c] !== -1) unrevealedSafe++;
        }
      }
      if (unrevealedSafe === 0) endGame(true);
    }

    /** 结束对局：展示全部雷、更新表情、写入战绩 */
    function endGame(won) {
      gameOver = true;
      gameWon = won;
      gameState = GAME_STATE.ENDED;
      stopTimer();

      faceBtn.textContent = won ? "😎" : "😵";

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (board[r][c] === -1) {
            revealed[r][c] = true;
            const el = getCellEl(r, c);
            el.classList.add("revealed", "mine");
            if (!won) el.classList.remove("flagged");
          }
        }
      }

      if (!won) {
        // 失败时高亮触发的那颗雷
        boardEl.querySelectorAll(".cell.revealed.mine").forEach((el) => el.classList.add("mine-hit"));
      }

      messageEl.textContent = won
        ? `🎉 恭喜通关！用时 ${seconds} 秒（已记录）`
        : `💥 踩雷失败，用时 ${seconds} 秒（已记录）`;
      messageEl.className = "message " + (won ? "win" : "lose");

      recordGameResult(won);
      setUIForState();
    }

    /** 状态栏剩余雷数 = 总雷数 - 已插旗数 */
    function updateMineDisplay() {
      mineCountEl.textContent = pad3(mineCount - flagsPlaced);
    }

    function updateTimerDisplay() {
      timerEl.textContent = pad3(seconds);
    }

    /** 从首次操作开始每秒递增，上限 999 */
    function startTimer() {
      stopTimer();
      timerInterval = setInterval(() => {
        seconds++;
        updateTimerDisplay();
        if (seconds >= 999) stopTimer();
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    // ========== 事件绑定 ==========
    startBtn.addEventListener("click", startGame);
    newGameBtn.addEventListener("click", () => {
      if (getConfig()) startGame();
      else resetToIdle();
    });
    faceBtn.addEventListener("click", () => {
      if (gameState !== GAME_STATE.IDLE && getConfig()) startGame();
    });

    // 导出战绩为 JSON 文件下载
    document.getElementById("exportRecords").addEventListener("click", () => {
      const data = loadRecords();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `minesweeper-records-${VERSION}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // 清空 localStorage 中的全部战绩
    document.getElementById("clearRecords").addEventListener("click", () => {
      if (confirm("确定清空所有战绩记录？")) {
        localStorage.removeItem(STORAGE_KEY);
        renderRecordsPanel();
      }
    });

    // ========== 页面初始化：占位棋盘 + 等待开局 UI + 加载战绩 ==========
    showIdleBoard();
    setUIForState();
    renderRecordsPanel();
  </script>
</body>
</html>
